server:
  address: "tcp://0.0.0.0:9091"

log:
  level: debug

identity_validation:
  reset_password:
    jwt_secret: <<FILE:/secrets/JWT_SECRET

authentication_backend:
  ldap:
    implementation: lldap
    address: ldap://lldap:3890
    timeout: 5s
    start_tls: false
    base_dn: dc=rwa,dc=local
    additional_users_dn: ou=people
    users_filter: "(&({username_attribute}={input})(objectClass=person))"
    additional_groups_dn: ou=groups
    groups_filter: "(member={dn})"
    attributes:
      username: uid
      display_name: displayName
      mail: mail
      group_name: cn
    user: uid=admin,ou=people,dc=rwa,dc=local
    password: password123

session:
  secret: <<FILE:/secrets/SESSION_SECRET
  name: authelia_session
  same_site: lax
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
    - domain: rwa.local
      authelia_url: https://auth.rwa.local
      default_redirection_url: https://admin.rwa.local
  redis:
    host: redis
    port: 6379

storage:
  encryption_key: <<FILE:/secrets/STORAGE_ENCRYPTION_KEY
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt

access_control:
  default_policy: deny
  rules:
    # 0. Разрешаем доступ к порталу и API проверки
    - domain: "auth.rwa.local"
      policy: bypass
    - domain: "*.rwa.local"
      resources: ["^/api/verify.*$", "^/api/health.*$", "^/-/healthy.*$"]
      policy: bypass
    - domain: ["grafana.rwa.local", "prometheus.rwa.local"]
      resources: ["^/$"]
      methods: ["GET", "OPTIONS", "HEAD"]
      policy: bypass

    # 1. Доступ к главной панели управления для всех авторизованных пользователей
    - domain: "admin.rwa.local"
      policy: one_factor

    # 2. Полный доступ ко всем остальным поддоменам только для администраторов
    - domain: ["auth.rwa.local", "lldap.rwa.local", "grafana.rwa.local", "prometheus.rwa.local", "alloy.rwa.local", "redis.rwa.local", "portainer.rwa.local", "uptime.rwa.local", "graphiql.rwa.local"]
      subject: "group:lldap_admin"
      policy: one_factor

    # 3. RabbitMQ - для группы admin_rabbitmq или lldap_admin
    - domain: "rabbitmq.rwa.local"
      subject: ["group:admin_rabbitmq", "group:lldap_admin"]
      policy: one_factor

    # 4. MongoDB - для группы admin_mongodb или lldap_admin
    - domain: "mongo.rwa.local"
      subject: ["group:admin_mongodb", "group:lldap_admin"]
      policy: one_factor

    # 5. Основной фронтенд
    - domain: "rwa.local"
      policy: bypass
