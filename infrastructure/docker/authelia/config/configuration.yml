server:
  address: "tcp://0.0.0.0:9091"

identity_validation:
  reset_password:
    jwt_secret: <<FILE:/secrets/JWT_SECRET

authentication_backend:
  file:
    path: /config/users_database.yml

session:
  secret: <<FILE:/secrets/SESSION_SECRET
  name: authelia_session
  same_site: lax
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
    - domain: 127.0.0.1
      authelia_url: https://127.0.0.1:9091
      default_redirection_url: https://127.0.0.1/administration/
  redis:
    host: redis
    port: 6379

storage:
  encryption_key: <<FILE:/secrets/STORAGE_ENCRYPTION_KEY
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt

access_control:
  default_policy: deny
  rules:
    - domain: 127.0.0.1
      policy: one_factor
