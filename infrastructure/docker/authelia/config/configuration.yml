server:
  address: "tcp://0.0.0.0:9091"

log:
  level: debug

identity_validation:
  reset_password:
    jwt_secret: <<FILE:/secrets/JWT_SECRET

authentication_backend:
  ldap:
    implementation: lldap
    address: ldap://lldap:3890
    timeout: 5s
    start_tls: false
    base_dn: dc=rwa,dc=local
    additional_users_dn: ou=people
    users_filter: "(&({username_attribute}={input})(objectClass=person))"
    additional_groups_dn: ou=groups
    groups_filter: "(member={dn})"
    attributes:
      username: uid
      display_name: displayName
      mail: mail
      group_name: cn
    user: uid=admin,ou=people,dc=rwa,dc=local
    password: password123

session:
  secret: <<FILE:/secrets/SESSION_SECRET
  name: authelia_session
  same_site: lax
  expiration: 1h
  inactivity: 5m
  remember_me: 1M
  cookies:
    - domain: 127.0.0.1
      authelia_url: https://127.0.0.1:9091
      default_redirection_url: https://127.0.0.1/administration/
  redis:
    host: redis
    port: 6379

storage:
  encryption_key: <<FILE:/secrets/STORAGE_ENCRYPTION_KEY
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt

access_control:
  default_policy: deny
  rules:
    # 0. Разрешаем доступ к порталу и API проверки
    - domain: "127.0.0.1"
      resources: ["^/authelia/.*$", "^/api/verify.*$"]
      policy: bypass

    # 1. RabbitMQ - только для группы admin_rabbitmq
    - domain: "127.0.0.1"
      resources: ["^/administration/rabbitmq/.*$"]
      subject: "group:admin_rabbitmq"
      policy: one_factor

    # 2. MongoDB - только для группы admin_mongodb
    - domain: "127.0.0.1"
      resources: ["^/administration/mongo-express/.*$"]
      subject: "group:admin_mongodb"
      policy: one_factor

    # 3. Всё остальное в administration - только для админов (lldap_admin)
    - domain: "127.0.0.1"
      resources: ["^/administration/(grafana|prometheus|alloy|redis-insight|portainer|graphql)/.*$"]
      subject: "group:lldap_admin"
      policy: one_factor

    # 4. Корень админки - доступен всем авторизованным пользователям
    - domain: "127.0.0.1"
      resources: ["^/administration/($|index.html)"]
      policy: one_factor
