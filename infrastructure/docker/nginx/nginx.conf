worker_processes auto;
pid /var/run/nginx.pid;

# Load OpenTelemetry and VTS modules
load_module modules/ngx_otel_module.so;
load_module modules/ngx_http_vhost_traffic_status_module.so;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # OpenTelemetry configuration
    otel_exporter {
        endpoint alloy:4319;
        interval 5s;
        batch_size 512;
        batch_count 4;
    }
    
    otel_service_name "nginx-gateway";
    otel_resource_attr "service.version" "1.29.0";
    otel_resource_attr "deployment.environment" "production";
    otel_resource_attr "service.namespace" "rwa-platform";
    
    # VTS module configuration
    vhost_traffic_status_zone;
    
    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;
    
    keepalive_timeout 65;
    keepalive_requests 100;
    client_header_timeout 60s;
    client_body_timeout 60s;
    send_timeout 60s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80 default_server;
        server_name _;
        location /status {
            vhost_traffic_status_display;
            vhost_traffic_status_display_format prometheus;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
        location / {
            return 301 https://$http_host$request_uri;
        }
    }

    # Authelia Portal Server on port 9091
    server {
        listen 9091 ssl;
        server_name _;
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        error_page 497 https://$http_host$request_uri;

        location / {
            set $authelia_upstream "http://authelia:9091";
            proxy_pass $authelia_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # LLDAP Admin UI on port 17170
    server {
        listen 17170 ssl;
        server_name _;
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        error_page 497 https://$http_host$request_uri;

        location / {
            set $lldap_upstream "http://lldap:17170";
            proxy_pass $lldap_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_redirect off;
        }
    }

    server {
        listen 443 ssl;
        server_name _;
        error_page 497 https://$http_host$request_uri;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location /authelia/api/verify {
            internal;
            set $authelia_verify_upstream "http://authelia:9091/api/verify";
            proxy_pass $authelia_verify_upstream;
            proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        location / {  
            set $frontend_upstream "http://frontend:3000";
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /gateway/graphql/stream {
            set $gateway_stream_upstream "http://gateway:3000/graphql/stream";
            proxy_pass $gateway_stream_upstream;
            proxy_http_version 1.1;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, X-HTTP2-Support' always;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, X-HTTP2-Support';
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ignore_client_abort off;
            proxy_connect_timeout 60s;
        }

        location /files/ {
            alias /app/storage/;
            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options DENY;
            add_header X-XSS-Protection "1; mode=block";
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept' always;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept';
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location /gateway/graphql {
            otel_trace on;
            otel_trace_context propagate;
            otel_span_name "nginx_graphql_proxy";
            otel_span_attr "http.route" "/gateway/graphql";
            set $gateway_upstream "http://gateway:3000/graphql";
            proxy_pass $gateway_upstream;
            proxy_http_version 1.1;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, X-HTTP2-Support, Authorization, traceparent, tracestate' always;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, X-HTTP2-Support, Authorization, traceparent, tracestate';
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /administration/ {
            auth_request /authelia/api/verify;
            error_page 401 =302 https://$http_host:9091/;
            alias /usr/share/nginx/html/admin/;
            index index.html;
        }
        location = /administration/index.html {
            auth_request /authelia/api/verify;
            error_page 401 =302 https://$http_host:9091/;
            alias /usr/share/nginx/html/admin/index.html;
        }
        location = /administration { return 301 /administration/; }

        location /administration/grafana/ {
            auth_request /authelia/api/verify;
            error_page 401 =302 https://$http_host:9091/;
            auth_request_set $user $upstream_http_remote_user;
            proxy_set_header Remote-User $user;
            rewrite ^/grafana/(.*) /$1 break;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            set $grafana_upstream "http://grafana:3000";
            proxy_pass $grafana_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /administration/prometheus/ {
            auth_request /authelia/api/verify;
            error_page 401 =302 https://$http_host:9091/;
            set $prometheus_upstream "http://prometheus:9090";
            rewrite ^/administration/prometheus/(.*)$ /$1 break;
            proxy_pass $prometheus_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            sub_filter_types *;
            sub_filter_once off;
            sub_filter 'href="/' 'href="/administration/prometheus/';
            sub_filter 'src="/' 'src="/administration/prometheus/';
            sub_filter 'action="/' 'action="/administration/prometheus/';
        }

        location /administration/alloy/ {
            auth_request /authelia/api/verify;
            error_page 401 =302 https://$http_host:9091/;
            set $alloy_upstream "http://alloy:12345";
            rewrite ^/administration/alloy/(.*)$ /$1 break;
            proxy_pass $alloy_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            sub_filter_types *;
            sub_filter_once off;
            sub_filter 'href="/' 'href="/administration/alloy/';
            sub_filter 'src="/' 'src="/administration/alloy/';
            sub_filter 'action="/' 'action="/administration/alloy/';
        }

        location /administration/rabbitmq/ {
            auth_request /authelia/api/verify;
            error_page 401 =302 https://$http_host:9091/;
            set $rabbitmq_upstream "http://rabbitmq:15672";
            rewrite ^/administration/rabbitmq/(.*)$ /$1 break;
            proxy_pass $rabbitmq_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /administration/rabbitmq;
            proxy_buffering off;
            proxy_http_version 1.1;
        }

        location /administration/mongo-express/ {
            auth_request /authelia/api/verify;
            error_page 401 =302 https://$http_host:9091/;
            set $mongo_express_upstream "http://mongo_express:8081";
            proxy_pass $mongo_express_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_http_version 1.1;
        }

        location /administration/redis-insight/ {
            auth_request /authelia/api/verify;
            error_page 401 =302 https://$http_host:9091/;
            set $redisinsight_upstream "http://redisinsight:5540";
            proxy_pass $redisinsight_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 90;
            proxy_connect_timeout 90;
            proxy_redirect off;
        }

        location /administration/portainer/ {
            auth_request /authelia/api/verify;
            error_page 401 =302 https://$http_host:9091/;
            set $portainer_upstream "http://portainer:9000";
            rewrite ^/administration/portainer/(.*)$ /$1 break;
            proxy_pass $portainer_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /administration/portainer;
        }

        location /administration/graphql/ {
            auth_request /authelia/api/verify;
            error_page 401 =302 https://$http_host:9091/;
            set $gateway_graphql_ui "http://gateway:3000/graphql/";
            proxy_pass $gateway_graphql_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }

        location /administration/lldap/ {
            return 301 https://$http_host:17170/;
        }
    }

    server {
        listen 3001 ssl;
        server_name _;
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        error_page 497 https://$http_host$request_uri;

        location / {
            auth_request /authelia/api/verify;
            error_page 401 =302 https://$http_host:9091/;
            set $uptime_kuma_upstream "http://uptime-kuma:3001";
            proxy_pass $uptime_kuma_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_redirect off;
        }
    }
}
