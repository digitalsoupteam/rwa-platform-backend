worker_processes auto;
pid /var/run/nginx.pid;

# Load OpenTelemetry and VTS modules
load_module modules/ngx_otel_module.so;
load_module modules/ngx_http_vhost_traffic_status_module.so;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # OpenTelemetry configuration
    otel_exporter {
        endpoint alloy:4319;
        interval 5s;
        batch_size 512;
        batch_count 4;
    }
    
    otel_service_name "nginx-gateway";
    otel_resource_attr "service.version" "1.29.0";
    otel_resource_attr "deployment.environment" "production";
    otel_resource_attr "service.namespace" "rwa-platform";
    
    # VTS module configuration
    vhost_traffic_status_zone;
    
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;
    
    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;
    
    keepalive_timeout 65;
    keepalive_requests 100;
    client_header_timeout 60s;
    client_body_timeout 60s;
    send_timeout 60s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # HTTP to HTTPS redirect & Status
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /status {
            vhost_traffic_status_display;
            vhost_traffic_status_display_format prometheus;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Load modular configurations
    include /etc/nginx/conf.d/*.conf;
}
