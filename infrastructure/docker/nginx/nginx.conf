worker_processes auto;
pid /var/run/nginx.pid;

# Load OpenTelemetry and VTS modules
load_module modules/ngx_otel_module.so;
load_module modules/ngx_http_vhost_traffic_status_module.so;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # OpenTelemetry configuration
    otel_exporter {
        endpoint alloy:4319;
        interval 5s;
        batch_size 512;
        batch_count 4;
    }
    
    otel_service_name "nginx-gateway";
    otel_resource_attr "service.version" "1.29.0";
    otel_resource_attr "deployment.environment" "production";
    otel_resource_attr "service.namespace" "rwa-platform";
    
    # VTS module configuration
    vhost_traffic_status_zone;
    
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;
    
    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;
    
    keepalive_timeout 65;
    keepalive_requests 100;
    client_header_timeout 60s;
    client_body_timeout 60s;
    send_timeout 60s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80 default_server;
        server_name _;
        location /status {
            vhost_traffic_status_display;
            vhost_traffic_status_display_format prometheus;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Authelia Portal
    server {
        listen 443 ssl;
        server_name auth.rwa.local;
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            set $authelia_upstream "http://authelia:9091";
            proxy_pass $authelia_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # LLDAP Admin UI
    server {
        listen 443 ssl;
        server_name lldap.rwa.local;
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            auth_request /authelia/api/verify;
            error_page 401 =302 https://auth.rwa.local/;
            
            set $lldap_upstream "http://lldap:17170";
            proxy_pass $lldap_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /authelia/api/verify {
            internal;
            set $authelia_verify_upstream "http://authelia:9091/api/verify";
            proxy_pass $authelia_verify_upstream;
            proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }
    }

    # Main Frontend & Gateway
    server {
        listen 443 ssl;
        server_name rwa.local;
        error_page 497 https://$host$request_uri;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location /authelia/api/verify {
            internal;
            set $authelia_verify_upstream "http://authelia:9091/api/verify";
            proxy_pass $authelia_verify_upstream;
            proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        location / {  
            set $frontend_upstream "http://frontend:3000";
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /gateway/graphql/stream {
            set $gateway_stream_upstream "http://gateway:3000/graphql/stream";
            proxy_pass $gateway_stream_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /files/ {
            alias /app/storage/;
            add_header X-Content-Type-Options nosniff;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location /gateway/graphql {
            otel_trace on;
            otel_trace_context propagate;
            set $gateway_upstream "http://gateway:3000/graphql";
            proxy_pass $gateway_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

